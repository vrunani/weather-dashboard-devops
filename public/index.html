<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080b0f;
      --surface:  #0e1318;
      --surface2: #141b22;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.12);
      --green:    #00ff88;
      --green2:   #00cc6a;
      --amber:    #ffb347;
      --blue:     #4fa3f7;
      --text:     #f0f4f8;
      --muted:    rgba(240,244,248,0.38);
      --dim:      rgba(240,244,248,0.14);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,255,136,0.013) 3px,
        rgba(0,255,136,0.013) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ===== TOP BAR ===== */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 48px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(8,11,15,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 2.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .logo-text {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--text);
    }
    .logo-text span { color: var(--green); }
    .topbar-center {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
    }
    .topbar-right {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid rgba(0,255,136,0.25);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 10px;
      color: var(--green);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
    }

    /* ===== SEARCH AREA ===== */
    .search-area {
      padding: 32px 32px 0;
      display: flex;
      align-items: center;
      gap: 0;
      max-width: 700px;
    }
    .search-prefix {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--green);
      padding: 12px 16px 12px 20px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-right: none;
      white-space: nowrap;
      letter-spacing: 1px;
    }
    .search-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-right: none;
      padding: 12px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      letter-spacing: 0.5px;
      transition: border-color 0.25s;
      min-width: 0;
    }
    .search-input::placeholder { color: var(--dim); }
    .search-input:focus { border-color: var(--green); }
    .search-btn {
      background: var(--green);
      color: var(--bg);
      border: none;
      padding: 12px 28px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .search-btn:hover { background: var(--green2); }

    /* ===== ERROR ===== */
    .error-bar {
      margin: 20px 32px 0;
      padding: 12px 20px;
      border-left: 3px solid #ff4a4a;
      background: rgba(255,74,74,0.07);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #ff9090;
      display: none;
    }

    /* ===== MAIN ===== */
    .main { padding: 28px 32px 60px; }

    /* ===== WELCOME ===== */
    .welcome {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 80px 0;
      animation: fadeUp 0.7s ease both;
    }
    .welcome-line1 {
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 800;
      line-height: 0.9;
      color: var(--text);
      letter-spacing: -2px;
    }
    .welcome-line1 em {
      font-style: normal;
      color: var(--green);
      display: block;
    }
    .welcome-sub {
      margin-top: 28px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .welcome-sub::before {
      content: '';
      display: block;
      width: 32px; height: 1px;
      background: var(--green);
    }

    /* ===== WEATHER RESULT ===== */
    .result { animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }

    /* ===== TOP DATA ROW ===== */
    .data-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 24px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .dh-location {}
    .dh-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--green);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .dh-city {
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -2px;
      color: var(--text);
    }
    .dh-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dh-meta .sep { color: var(--dim); }
    .dh-right {
      text-align: right;
    }
    .dh-condition-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .weather-icon-img {
      width: 72px; height: 72px;
      filter: brightness(1.1) saturate(1.2);
      animation: floatIcon 5s ease-in-out infinite;
      display: block;
      margin-left: auto;
    }
    @keyframes floatIcon {
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-7px); }
    }

    /* ===== PRIMARY GRID ===== */
    .primary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2px;
      margin-bottom: 2px;
    }

    .p-cell {
      background: var(--surface);
      padding: 28px 26px;
    }
    .p-cell.accent { background: var(--green); }
    .p-cell.wide { grid-column: span 2; }

    .cell-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .p-cell.accent .cell-label { color: rgba(8,11,15,0.55); }

    .cell-val {
      font-size: clamp(36px, 5vw, 60px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
      color: var(--text);
    }
    .p-cell.accent .cell-val { color: var(--bg); }

    .cell-unit {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 4px;
      letter-spacing: 1px;
    }
    .p-cell.accent .cell-unit { color: rgba(8,11,15,0.5); }

    .cell-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }
    .p-cell.accent .cell-sub { color: rgba(8,11,15,0.5); }

    /* temp range row inside cell */
    .range-row {
      display: flex;
      gap: 20px;
      margin-top: 12px;
    }
    .rr-hi {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--amber);
      letter-spacing: 1px;
    }
    .rr-lo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--blue);
      letter-spacing: 1px;
    }

    /* ===== SECONDARY GRID ===== */
    .secondary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      margin-bottom: 2px;
    }
    .s-cell {
      background: var(--surface2);
      padding: 22px 20px;
      position: relative;
      overflow: hidden;
    }
    .s-cell::after {
      content: attr(data-glyph);
      position: absolute;
      right: 16px;
      bottom: 14px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--dim);
      letter-spacing: 1px;
    }
    .s-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .s-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .bar-track {
      height: 2px;
      background: var(--border2);
      margin-top: 12px;
    }
    .bar-fill {
      height: 100%;
      background: var(--green);
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }

    /* ===== SUN ROW ===== */
    .sun-row {
      background: var(--surface);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }
    .sun-cell {
      padding: 22px 26px;
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--surface2);
    }
    .sun-glyph {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--amber);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }
    .sun-time {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      color: var(--text);
    }
    .sun-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 720px) {
      .topbar { padding: 0 16px; }
      .topbar-center { display: none; }
      .search-area { padding: 20px 16px 0; flex-wrap: wrap; }
      .search-prefix { display: none; }
      .main { padding: 20px 16px 60px; }
      .primary-grid { grid-template-columns: 1fr; }
      .p-cell.wide { grid-column: span 1; }
      .secondary-grid { grid-template-columns: repeat(2, 1fr); }
      .sun-row { grid-template-columns: 1fr; }
      .dh-city { font-size: 38px; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-dot"></div>
    <div class="logo-text">N<span>O</span>VA</div>
  </div>
  <div class="topbar-center">ATMOSPHERIC DATA SYSTEM</div>
  <div class="topbar-right">
    <div class="status-pill">
      <div class="status-dot"></div>
      <span id="clock">— : — : —</span>
    </div>
  </div>
</div>

<!-- SEARCH -->
<div class="search-area">
  <div class="search-prefix">$ city</div>
  <input class="search-input" type="text" id="cityInput"
         placeholder="london, tokyo, cairo..." autocomplete="off" autofocus />
  <button class="search-btn" onclick="getWeather()">Run →</button>
</div>

<!-- ERROR -->
<div class="error-bar" id="errorBar">// ERROR: <span id="errorMsg"></span></div>

<!-- MAIN -->
<div class="main">

  <!-- WELCOME -->
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-line1">
      Real-time<em>weather.</em>
    </div>
    <div class="welcome-sub">Search any city to load atmospheric data</div>
  </div>

  <!-- RESULT -->
  <div class="result" id="weatherResult" style="display:none">

    <!-- DATA HEADER -->
    <div class="data-header">
      <div class="dh-location">
        <div class="dh-tag">// location</div>
        <div class="dh-city" id="cityName">—</div>
        <div class="dh-meta">
          <span id="countryCode">—</span>
          <span class="sep">/</span>
          <span id="localTime">—</span>
        </div>
      </div>
      <div class="dh-right">
        <div class="dh-condition-text" id="conditionLabel">—</div>
        <img class="weather-icon-img" id="wxIcon" src="" alt="weather icon" />
      </div>
    </div>

    <!-- PRIMARY GRID -->
    <div class="primary-grid">

      <!-- Temperature — accent cell -->
      <div class="p-cell accent wide">
        <div class="cell-label">// temperature</div>
        <div>
          <span class="cell-val" id="tempMain">—</span><span class="cell-unit">°C</span>
        </div>
        <div class="cell-sub" id="tempFeels">feels like —</div>
        <div class="range-row">
          <span class="rr-hi" id="tempHi">▲ —</span>
          <span class="rr-lo" id="tempLo">▼ —</span>
        </div>
      </div>

      <!-- Wind -->
      <div class="p-cell">
        <div class="cell-label">// wind</div>
        <div>
          <span class="cell-val" id="windSpeedVal">—</span><span class="cell-unit">km/h</span>
        </div>
        <div class="cell-sub" id="windDirVal">— deg</div>
      </div>

    </div>

    <!-- SECONDARY GRID -->
    <div class="secondary-grid">

      <div class="s-cell" data-glyph="%">
        <div class="s-val" id="humidityVal">—</div>
        <div class="s-label">Humidity</div>
        <div class="bar-track"><div class="bar-fill" id="humBar" style="width:0%"></div></div>
      </div>

      <div class="s-cell" data-glyph="hPa">
        <div class="s-val" id="pressureVal">—</div>
        <div class="s-label">Pressure</div>
        <div class="bar-track"><div class="bar-fill" id="presBar" style="width:0%"></div></div>
      </div>

      <div class="s-cell" data-glyph="km">
        <div class="s-val" id="visibilityVal">—</div>
        <div class="s-label">Visibility</div>
        <div class="bar-track"><div class="bar-fill" id="visBar" style="width:0%"></div></div>
      </div>

      <div class="s-cell" data-glyph="m/s">
        <div class="s-val" id="windMsVal">—</div>
        <div class="s-label">Wind m/s</div>
        <div class="bar-track"><div class="bar-fill" id="windBar" style="width:0%"></div></div>
      </div>

    </div>

    <!-- SUN ROW -->
    <div class="sun-row">
      <div class="sun-cell">
        <div class="sun-glyph">Rise</div>
        <div>
          <div class="sun-time" id="sunriseVal">—</div>
          <div class="sun-name">Sunrise</div>
        </div>
      </div>
      <div class="sun-cell">
        <div class="sun-glyph">Set</div>
        <div>
          <div class="sun-time" id="sunsetVal">—</div>
          <div class="sun-name">Sunset</div>
        </div>
      </div>
    </div>

  </div><!-- /result -->
</div>

<script>
  function tick() {
    const now = new Date();
    const h = String(now.getUTCHours()).padStart(2,'0');
    const m = String(now.getUTCMinutes()).padStart(2,'0');
    const s = String(now.getUTCSeconds()).padStart(2,'0');
    const el = document.getElementById('clock');
    if (el) el.textContent = h + ':' + m + ':' + s;
  }
  tick(); setInterval(tick, 1000);

  document.getElementById('cityInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') getWeather();
  });

  function getWeather() {
    const city = document.getElementById('cityInput').value.trim() || 'London';
    document.getElementById('errorBar').style.display = 'none';

    fetch('/api/weather?city=' + encodeURIComponent(city))
      .then(r => r.json())
      .then(data => {
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('weatherResult').style.display = 'block';

        // Header
        document.getElementById('cityName').textContent    = data.city;
        document.getElementById('countryCode').textContent = data.country || '—';
        document.getElementById('localTime').textContent   = data.localTime || '—';
        document.getElementById('conditionLabel').textContent = (data.condition || '').toUpperCase();

        const iconCode = data.iconCode || '01d';
        document.getElementById('wxIcon').src = 'https://openweathermap.org/img/wn/' + iconCode + '@2x.png';
        document.getElementById('wxIcon').alt = data.condition || '';

        // Temperature
        const temp = parseFloat(data.temperature) || 0;
        document.getElementById('tempMain').textContent  = Math.round(temp);
        document.getElementById('tempFeels').textContent = 'feels like ' + Math.round(parseFloat(data.feelsLike) || temp) + '°C';
        document.getElementById('tempHi').textContent    = '▲ ' + Math.round(parseFloat(data.tempMax) || temp) + '°C';
        document.getElementById('tempLo').textContent    = '▼ ' + Math.round(parseFloat(data.tempMin) || temp) + '°C';

        // Wind
        const windMs  = parseFloat(data.windSpeed) || 0;
        const windKmh = Math.round(windMs * 3.6);
        document.getElementById('windSpeedVal').textContent = windKmh;
        document.getElementById('windDirVal').textContent   = (data.windDirection || '—') + ' · ' + (data.windDeg || '—') + '°';
        document.getElementById('windMsVal').textContent    = windMs.toFixed(1);
        document.getElementById('windBar').style.width      = Math.min((windMs / 30) * 100, 100) + '%';

        // Secondary stats
        const hum = parseInt(data.humidity) || 0;
        document.getElementById('humidityVal').textContent = hum + '%';
        document.getElementById('humBar').style.width      = hum + '%';

        const prs = parseFloat(data.pressure) || 1013;
        document.getElementById('pressureVal').textContent = Math.round(prs);
        document.getElementById('presBar').style.width     = Math.min(((prs - 970) / 70) * 100, 100) + '%';

        const vis = parseFloat(data.visibility) || 10;
        document.getElementById('visibilityVal').textContent = vis.toFixed(1);
        document.getElementById('visBar').style.width        = Math.min((vis / 20) * 100, 100) + '%';

        // Sun
        document.getElementById('sunriseVal').textContent = data.sunrise || '—';
        document.getElementById('sunsetVal').textContent  = data.sunset  || '—';
      })
      .catch(() => {
        document.getElementById('errorBar').style.display = 'block';
        document.getElementById('errorMsg').textContent = 'could not fetch weather data. check city name.';
      });
  }
</script>
</body>
</html>
